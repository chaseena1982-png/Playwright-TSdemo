name: Heartbeat Scheduler Test

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes (UTC)
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Print heartbeat message
        run: |
          echo "✅ Heartbeat workflow is running"
          echo "🕒 UTC time: $(date -u)"
          echo "🚀 Scheduler is working correctly"